[env:atmega328p]
platform = atmelavr
board = ATmega328P
framework = arduino
board_build.f_cpu = 16000000L

; lexus2k/lcdgfx@1.3.1 ; i used to use this before
; mathertel/RotaryEncoder@1.6.0
lib_deps = 
	adafruit/Adafruit SSD1306@2.5.17
